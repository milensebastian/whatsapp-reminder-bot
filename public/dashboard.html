<!DOCTYPE html>
<html>
<head>

<title>Notify Admin Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:#eef2f7;
}

/* HEADER */

.header{
background:linear-gradient(90deg,#3a7bd5,#00d2ff);
color:white;
padding:18px;
display:flex;
justify-content:space-between;
align-items:center;
}

.header h2{
margin:0;
}

.logout{
background:#e74c3c;
padding:8px 14px;
color:white;
text-decoration:none;
border-radius:6px;
}

/* LAYOUT */

.container{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
padding:25px;
max-width:1200px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
}

/* INPUTS */

input,textarea,select{
width:100%;
padding:10px;
margin-top:8px;
margin-bottom:12px;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
background:#3498db;
color:white;
border:none;
border-radius:6px;
font-size:15px;
cursor:pointer;
}

button:hover{
background:#2980b9;
}

/* TASK LIST */

.task{
border-bottom:1px solid #eee;
padding:10px 0;
}

.priority-normal{
color:#2c3e50;
}

.priority-important{
color:#e67e22;
font-weight:bold;
}

.priority-urgent{
color:#e74c3c;
font-weight:bold;
}

.stats{
display:flex;
justify-content:space-between;
margin-top:10px;
}

.statbox{
background:#f7f9fc;
padding:15px;
border-radius:10px;
width:30%;
text-align:center;
}

</style>

</head>

<body>

<div class="header">

<h2>🔔 Notify – Campus Alert</h2>

<a class="logout" href="/logout">Logout</a>

</div>

<div class="container">

<!-- CREATE TASK -->

<div class="card">

<h3>Create Task</h3>

<form id="taskForm">

<label>Title</label>
<input name="title" required>

<label>Description</label>
<textarea name="description"></textarea>

<label>Deadline</label>
<input type="datetime-local" name="deadline" required>

<label>Priority</label>
<select name="priority">
<option value="Normal">Normal</option>
<option value="Important">Important</option>
<option value="Urgent">Urgent</option>
</select>

<button>Create Task</button>

</form>

</div>

<!-- STUDENT UPLOAD -->

<div class="card">

<h3>Upload Student List</h3>

<form id="uploadForm" enctype="multipart/form-data">

<input type="file" name="file" required>

<button>Upload Excel</button>

</form>

</div>

<!-- TASK LIST -->

<div class="card" style="grid-column:1/3">

<h3>Active Tasks</h3>

<div id="taskList">

Loading tasks...

</div>

</div>

<!-- ANALYTICS -->

<div class="card">

<h3>Analytics</h3>

<div class="stats">

<div class="statbox">
<h3 id="taskCount">0</h3>
Tasks
</div>

<div class="statbox">
<h3 id="studentCount">0</h3>
Students
</div>

<div class="statbox">
<h3 id="pendingCount">0</h3>
Pending
</div>

</div>

</div>

</div>

<script>

/* CREATE TASK */

document.getElementById("taskForm").onsubmit = async e => {

e.preventDefault();

const form = new FormData(e.target);

const data = Object.fromEntries(form);

await fetch("/create-task",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify(data)
});

alert("Task created");

loadTasks();

};

/* UPLOAD STUDENTS */

document.getElementById("uploadForm").onsubmit = async e => {

e.preventDefault();

const form = new FormData(e.target);

await fetch("/upload-students",{
method:"POST",
body:form
});

alert("Students uploaded");

};

/* LOAD TASKS */

async function loadTasks(){

const res = await fetch("/tasks");

const tasks = await res.json();

const container = document.getElementById("taskList");

container.innerHTML="";

tasks.forEach(t=>{

let color="priority-normal";

if(t.priority==="Important") color="priority-important";
if(t.priority==="Urgent") color="priority-urgent";

const div = document.createElement("div");

div.className="task";

div.innerHTML=`
<b>${t.title}</b> 
<span class="${color}">(${t.priority})</span>
<br>
Deadline: ${t.deadline}
`;

container.appendChild(div);

});

document.getElementById("taskCount").innerText = tasks.length;

}

loadTasks();

</script>

</body>
</html>
