<!DOCTYPE html>
<html>

<head>

<title>Reminder Admin Panel</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
padding:0;
}

.header{
background:#2c3e50;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.container{
padding:30px;
max-width:900px;
margin:auto;
}

.card{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
margin-bottom:30px;
}

input, select, textarea{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:15px;
border-radius:6px;
border:1px solid #ddd;
}

button{
background:#27ae60;
color:white;
padding:12px;
border:none;
border-radius:6px;
cursor:pointer;
width:100%;
font-size:16px;
}

button:hover{
background:#219150;
}

.reminder{
padding:12px;
border-bottom:1px solid #eee;
}

.logout{
background:#e74c3c;
padding:8px 15px;
border-radius:6px;
color:white;
text-decoration:none;
}

</style>

</head>

<body>

<div class="header">

<h2>College Reminder System</h2>

<a class="logout" href="/logout">Logout</a>

</div>

<div class="container">

<div class="card">

<h3>Create Reminder</h3>

<form action="/add-reminder" method="POST">

<label>Reminder Message</label>

<textarea name="message" required></textarea>

<label>Schedule Type</label>

<select name="schedule_type">

<option value="daily">Every Day</option>
<option value="weekly">Every Week</option>
<option value="once">One Time</option>

</select>

<label>Reminder Time</label>

<input type="time" name="schedule_time" required>

<button type="submit">Create Reminder</button>

</form>

</div>

<div class="card">

<h3>Active Reminders</h3>

<div id="reminderList">

Loading reminders...

</div>

</div>

</div>

<script>

async function loadReminders(){

const res = await fetch("/reminders");
const data = await res.json();

const container = document.getElementById("reminderList");

container.innerHTML = "";

data.forEach(r => {

const div = document.createElement("div");

div.className = "reminder";

div.innerHTML = `
<strong>${r.message}</strong><br>
Schedule: ${r.schedule_type} at ${r.schedule_time}
`;

container.appendChild(div);

});

}

loadReminders();

</script>

</body>

</html>
