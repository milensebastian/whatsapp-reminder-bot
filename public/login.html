<!DOCTYPE html>
<html>

<head>
<title>Admin Login</title>

<style>

body{
font-family:Arial;
background:#f0f2f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:30px;
border-radius:10px;
width:300px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

input{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:20px;
border:1px solid #ddd;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:#4CAF50;
border:none;
color:white;
font-size:16px;
border-radius:5px;
}

</style>
</head>

<body>

<div class="box">

<h2>Admin Login</h2>

<form action="/login" method="POST">

<input name="username" placeholder="Username" required>

<input name="password" type="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

</div>

</body>
</html>
