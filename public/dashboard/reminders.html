<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notify Reminders</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <h1 class="brand">Notify</h1>
      <p class="tagline">View student reminder activity</p>
      <a class="nav-link" data-nav href="/dashboard/index.html">Dashboard</a>
      <a class="nav-link" data-nav href="/dashboard/tasks.html">Tasks</a>
      <a class="nav-link" data-nav href="/dashboard/announcements.html">Announcements</a>
      <a class="nav-link" data-nav href="/dashboard/reminders.html">Reminders</a>
      <a class="nav-link" data-nav href="/dashboard/users.html">Users</a>
      <a class="nav-link" data-nav href="/dashboard/classes.html">Classes</a>
      <a class="nav-link" data-nav href="/dashboard/polls.html">Polls</a>
      <a class="nav-link" data-nav href="/dashboard/file-distribution.html">Files</a>
      <a class="nav-link" data-nav href="/dashboard/analytics.html">Analytics</a>
    </aside>
    <main class="main">
      <section class="hero">
        <h1>Reminder lookup</h1>
        <p>Search reminders by user phone number and review the current queue.</p>
      </section>
      <section class="content-grid">
        <div class="card">
          <h2 class="section-title">Find Reminders</h2>
          <form id="reminderLookupForm" class="form-grid">
            <label>User Phone<input id="lookupPhone" placeholder="919876543210" required></label>
            <button type="submit">Load Reminders</button>
          </form>
          <div id="reminderStatus"></div>
        </div>
        <div class="card">
          <h2 class="section-title">Reminder List</h2>
          <div id="reminderList" class="list"></div>
        </div>
      </section>
    </main>
  </div>
  <script src="/js/app.js"></script>
  <script src="/js/reminders.js"></script>
</body>
</html>
