<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notify File Distribution</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <h1 class="brand">Notify</h1>
      <p class="tagline">Send study materials through WhatsApp</p>
      <a class="nav-link" data-nav href="/dashboard/index.html">Dashboard</a>
      <a class="nav-link" data-nav href="/dashboard/tasks.html">Tasks</a>
      <a class="nav-link" data-nav href="/dashboard/announcements.html">Announcements</a>
      <a class="nav-link" data-nav href="/dashboard/reminders.html">Reminders</a>
      <a class="nav-link" data-nav href="/dashboard/users.html">Users</a>
      <a class="nav-link" data-nav href="/dashboard/classes.html">Classes</a>
      <a class="nav-link" data-nav href="/dashboard/polls.html">Polls</a>
      <a class="nav-link" data-nav href="/dashboard/file-distribution.html">Files</a>
      <a class="nav-link" data-nav href="/dashboard/analytics.html">Analytics</a>
    </aside>
    <main class="main">
      <section class="hero">
        <h1>File distribution</h1>
        <p>Upload PDFs, DOCX files, or images and send them to an entire class through WhatsApp.</p>
      </section>
      <section class="content-grid">
        <div class="card">
          <h2 class="section-title">Upload Study Material</h2>
          <form id="fileUploadForm" class="form-grid" enctype="multipart/form-data">
            <label>Title<input id="fileTitle" required></label>
            <label>Target Class
              <select id="fileTargetClass"><option value="">Select class</option></select>
            </label>
            <label>File<input id="fileInput" type="file" accept=".pdf,.docx,.png,.jpg,.jpeg,.webp" required></label>
            <button type="submit">Upload and Send</button>
          </form>
          <div id="fileStatus"></div>
        </div>
        <div class="card">
          <h2 class="section-title">Distributed Files</h2>
          <div id="fileList" class="list"></div>
        </div>
      </section>
    </main>
  </div>
  <script src="/js/app.js"></script>
  <script src="/js/file-distribution.js"></script>
</body>
</html>
