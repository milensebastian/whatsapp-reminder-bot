<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notify Polls</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <h1 class="brand">Notify</h1>
      <p class="tagline">Create polls for class decisions</p>
      <a class="nav-link" data-nav href="/dashboard/index.html">Dashboard</a>
      <a class="nav-link" data-nav href="/dashboard/tasks.html">Tasks</a>
      <a class="nav-link" data-nav href="/dashboard/announcements.html">Announcements</a>
      <a class="nav-link" data-nav href="/dashboard/reminders.html">Reminders</a>
      <a class="nav-link" data-nav href="/dashboard/users.html">Users</a>
      <a class="nav-link" data-nav href="/dashboard/classes.html">Classes</a>
      <a class="nav-link" data-nav href="/dashboard/polls.html">Polls</a>
      <a class="nav-link" data-nav href="/dashboard/file-distribution.html">Files</a>
      <a class="nav-link" data-nav href="/dashboard/analytics.html">Analytics</a>
    </aside>
    <main class="main">
      <section class="hero">
        <h1>Poll builder</h1>
        <p>Create a class poll and collect votes through WhatsApp replies.</p>
      </section>
      <section class="content-grid">
        <div class="card">
          <h2 class="section-title">Create Poll</h2>
          <form id="pollForm" class="form-grid">
            <label>Question<input id="pollQuestion" required></label>
            <label>Option 1<input id="pollOption1" required></label>
            <label>Option 2<input id="pollOption2" required></label>
            <label>Option 3<input id="pollOption3"></label>
            <label>Target Class
              <select id="pollTargetClass"><option value="">Select class</option></select>
            </label>
            <button type="submit">Create Poll</button>
          </form>
          <div id="pollStatus"></div>
        </div>
        <div class="card">
          <h2 class="section-title">Recent Polls</h2>
          <div id="pollList" class="list"></div>
        </div>
      </section>
    </main>
  </div>
  <script src="/js/app.js"></script>
  <script src="/js/polls.js"></script>
</body>
</html>
