<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notify Tasks</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <h1 class="brand">Notify</h1>
      <p class="tagline">Manage assignments and delivery</p>
      <a class="nav-link" data-nav href="/dashboard/index.html">Dashboard</a>
      <a class="nav-link" data-nav href="/dashboard/tasks.html">Tasks</a>
      <a class="nav-link" data-nav href="/dashboard/announcements.html">Announcements</a>
      <a class="nav-link" data-nav href="/dashboard/reminders.html">Reminders</a>
      <a class="nav-link" data-nav href="/dashboard/users.html">Users</a>
      <a class="nav-link" data-nav href="/dashboard/classes.html">Classes</a>
      <a class="nav-link" data-nav href="/dashboard/polls.html">Polls</a>
      <a class="nav-link" data-nav href="/dashboard/file-distribution.html">Files</a>
      <a class="nav-link" data-nav href="/dashboard/analytics.html">Analytics</a>
    </aside>
    <main class="main">
      <section class="hero">
        <h1>Create task</h1>
        <p>Target all students, a department, a year, a class, or manually entered phone numbers.</p>
      </section>
      <section class="content-grid">
        <div class="card">
          <h2 class="section-title">New Task</h2>
          <form id="taskForm" class="form-grid">
            <label>Title<input id="taskTitle" required></label>
            <label>Description<textarea id="taskDescription" required></textarea></label>
            <label>Deadline<input id="taskDeadline" type="datetime-local" required></label>
            <label>Priority
              <select id="taskPriority">
                <option value="low">Low</option>
                <option value="medium" selected>Medium</option>
                <option value="high">High</option>
                <option value="critical">Critical</option>
              </select>
            </label>
            <label>Target Scope
              <select id="targetScope">
                <option value="manual">Manual Phones</option>
                <option value="all">All Students</option>
                <option value="department">Department</option>
                <option value="year">Year</option>
                <option value="class">Class</option>
              </select>
            </label>
            <label>Department
              <select id="targetDepartment"><option value="">Select department</option></select>
            </label>
            <label>Year
              <select id="targetYear"><option value="">Select year</option></select>
            </label>
            <label>Class
              <select id="targetClass"><option value="">Select class</option></select>
            </label>
            <label>Schedule Date<input id="taskScheduleDate" type="date"></label>
            <label>Schedule Time<input id="taskScheduleTime" type="time"></label>
            <label>Assigned Phones (manual scope only)<textarea id="assignedUsers" placeholder="919876543210, 919812345678"></textarea></label>
            <button type="submit">Create or Schedule Task</button>
          </form>
          <div id="taskStatus"></div>
        </div>
        <div class="card">
          <h2 class="section-title">Task Feed</h2>
          <div id="taskList" class="list"></div>
        </div>
      </section>
    </main>
  </div>
  <script src="/js/app.js"></script>
  <script src="/js/tasks.js"></script>
</body>
</html>
